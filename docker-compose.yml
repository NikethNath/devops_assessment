version: "3.9"

services:
  backend:
    image: ${DOCKERHUB_USERNAME}/na_2023bcd0056_backend:latest
    build:
      context: ./backend
    container_name: student_backend
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    image: ${DOCKERHUB_USERNAME}/na_2023bcd0056_frontend:latest
    build:
      context: ./frontend
    container_name: student_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
